<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#d4af37" />
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <meta name="description" content="AI Hair & Beard Studio - Sistema de Gerenciamento de Barbearias" />
        <link rel="manifest" href="/manifest.json" />
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Hair Studio" />
        <meta name="mobile-web-app-capable" content="yes" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&family=Orbitron:wght@600;700&display=swap" rel="stylesheet" />
        <style>
            @keyframes goldShine {
                0%   { background-position: -200% center; }
                100% { background-position:  200% center; }
            }
            #brand-badge {
                display: inline-flex !important;
                align-items: center !important;
                gap: 8px;
                position: fixed !important;
                bottom: 14px;
                right: 14px;
                padding: 8px 16px;
                border-radius: 999px !important;
                background: rgba(0, 0, 0, 0.8) !important;
                backdrop-filter: blur(10px);
                border: 1px solid rgba(212, 175, 55, 0.45) !important;
                box-shadow: 0 4px 20px rgba(212, 175, 55, 0.15), inset 0 1px 0 rgba(255, 215, 130, 0.15);
                text-decoration: none !important;
                z-index: 99999 !important;
                transition: all 0.25s ease;
            }
            #brand-badge:hover {
                transform: translateY(-2px);
                border-color: rgba(212, 175, 55, 0.8) !important;
                box-shadow: 0 6px 28px rgba(212, 175, 55, 0.35), inset 0 1px 0 rgba(255, 215, 130, 0.25);
            }
            #brand-badge .gold-text {
                font-family: 'Orbitron', 'Inter', sans-serif !important;
                font-size: 13px !important;
                font-weight: 700 !important;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                background: linear-gradient(
                    90deg,
                    #b8860b 0%,
                    #ffd700 20%,
                    #fff8dc 35%,
                    #ffd700 50%,
                    #b8860b 65%,
                    #ffd700 80%,
                    #fff8dc 100%
                );
                background-size: 200% auto;
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
                color: transparent;
                animation: goldShine 4s linear infinite;
                text-shadow: 0 0 20px rgba(255, 215, 0, 0.25);
            }
            #brand-badge .gold-icon {
                color: #ffd700;
                filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.5));
            }
        </style>
        <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
        <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
        <title>AI Hair & Beard Studio</title>
        <script>
            // Cache buster: force fresh CSS/JS on every load
            (function() {
                var version = 'v=' + new Date().getTime();
                var links = document.querySelectorAll('link[rel="stylesheet"]');
                links.forEach(function(link) {
                    if (link.href && !link.href.includes('fonts.googleapis')) {
                        link.href = link.href.split('?')[0] + '?' + version;
                    }
                });
            })();
        </script>
        <script>
            // Backend URL resolution:
            // 1. %REACT_APP_BACKEND_URL% is replaced at build time by CRA when env var is defined
            // 2. If unresolved (placeholder remains), fallback to localhost (dev) or same origin (production with reverse proxy)
            (function() {
                var fromEnv = "%REACT_APP_BACKEND_URL%";
                if (fromEnv && fromEnv.indexOf("REACT_APP_") === -1 && fromEnv.length > 0) {
                    window.__BACKEND_URL__ = fromEnv.replace(/\/+$/, "");
                } else if (window.location.hostname === 'localhost') {
                    // Use remote backend for local testing (change to 'http://localhost:8000' if running backend locally)
                    window.__BACKEND_URL__ = 'https://hair-beard-studio-api.onrender.com';
                } else {
                    window.__BACKEND_URL__ = window.location.origin;
                }
                console.log('Backend URL set to:', window.__BACKEND_URL__);
            })();
        </script>
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
    </head>

        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>

</html>
